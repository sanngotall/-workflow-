# ===================================================================
# DDT 本机 Docker 调试环境编排（对齐 AGENTS.md §5.2）
# ===================================================================
# 用途：本机开发调试，替代原 192.168.31.40 沙箱虚拟机。
# 使用方式（在 deployments/ 目录下执行）：
#     docker compose -f docker-compose.dev.yml up -d
# 端口映射（对齐 SPEC-00 §4）：
#     PostgreSQL  → localhost:15432
#     Redis       → localhost:16379
#     后端 NestJS → localhost:13000（容器内 3000）
# 前端调试优先使用 admin-dashboard-v3 / npm run dev（Vite 热更新，端口 3000）
# 后端调试优先使用 gateway-server / npm run start:dev（TS 热更新）
# 仅 PG/Redis 走容器，后端按需启动容器版本。
# ===================================================================

services:
  # ───────────────────────────────────────────────────────────────
  # PostgreSQL 16（开发库 ddt_gateway）
  # 端口 15432 映射到宿主机，便于本机直连排查（psql / DataGrip）
  # ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ddt-postgres-dev
    ports:
      - '15432:5432'
    environment:
      POSTGRES_DB: ddt_gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: PTahvdWeD5-4WRtQms6BJw
    volumes:
      # 挂载到项目根目录 data/postgres，方便整体迁移 / 备份 / git 忽略
      - ../data/postgres:/var/lib/postgresql/data
      # 开发期挂载初始化脚本目录（可选，便于灌入种子数据）
      - ./init-sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ───────────────────────────────────────────────────────────────
  # Redis 7（路由缓存 + 限流器 + BullMQ 队列）
  # 端口 16379 映射到宿主机，便于本机直连排查（redis-cli / RedisInsight）
  # ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ddt-redis-dev
    ports:
      - '16379:6379'
    volumes:
      # 挂载到项目根目录 data/redis，方便整体迁移 / 备份
      - ../data/redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ───────────────────────────────────────────────────────────────
  # 后端 gateway-server（容器化生产构建验证用）
  # 默认不启动；本地调试优先 npm run start:dev（TS 热更新）
  # 启动命令：
  #     docker compose -f docker-compose.dev.yml up -d gateway-server
  # ───────────────────────────────────────────────────────────────
  gateway-server:
    build:
      context: ../gateway-server
      dockerfile: Dockerfile
    container_name: ddt-gateway-dev
    ports:
      - '13000:3000'
    env_file:
      - ../gateway-server/.env
    environment:
      # 覆盖 .env，指向本 compose 内部容器名（容器间通信）
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
    volumes:
      # 应用日志持久化到项目根目录 data/logs/gateway
      - ../data/logs/gateway:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles: ['backend']  # 仅显式指定 profile 时才启动

  # ───────────────────────────────────────────────────────────────
  # Nginx（前端生产构建验证用）
  # 默认不启动；本地调试优先 admin-dashboard-v3 / npm run dev
  # 启动命令：
  #     docker compose -f docker-compose.dev.yml --profile web up -d nginx
  # ───────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ddt-nginx-dev
    ports:
      - '18880:80'
    volumes:
      - ../admin-dashboard-v3/dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway-server
    restart: unless-stopped
    profiles: ['web']

# 注：所有持久化数据采用绑定挂载到项目根目录 ../data/ 下，便于整体迁移与备份
# 目录结构：
#   data/postgres/   - PostgreSQL 数据
#   data/redis/      - Redis AOF/RDB 持久化
#   data/logs/gateway/ - 后端应用日志（容器化运行时）
# 详见项目根目录 .gitignore（data/ 已排除版本控制）
