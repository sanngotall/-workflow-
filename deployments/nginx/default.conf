server {
    listen 80;
    server_name localhost;

    # 安全头
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # 前端静态资源
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://gateway-server:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 网关路由代理（含 SSE 流式透传支持）
    location /gw/ {
        proxy_pass http://gateway-server:3000/gw/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        # SSE 关键：禁用缓冲，确保流式响应实时透传
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # 网关入口（transitId 模型）
    location /v1/transit/ {
        proxy_pass http://gateway-server:3000/v1/transit/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        # SSE 关键：禁用缓冲
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # 健康检查
    location /health {
        proxy_pass http://gateway-server:3000/health;
        proxy_set_header Host $host;
    }
}
