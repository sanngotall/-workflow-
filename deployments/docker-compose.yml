version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ddt-postgres
    ports:
      - '15432:5432'
    environment:
      POSTGRES_DB: ${DB_DATABASE:-ddt_gateway}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ddt-redis
    ports:
      - '16379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  gateway-server:
    image: ddt-gateway:latest
    container_name: ddt-gateway
    ports:
      - '13000:3000'
    env_file:
      - ./gateway.env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3000
      - NODE_ENV=production
      - FILE_STORAGE_ROOT=/app/storage/files
    volumes:
      - gateway_files:/app/storage/files
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://localhost:3000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: ddt-nginx
    ports:
      - '18880:80'
    volumes:
      - ./admin-dashboard-v3/dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      gateway-server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  gateway_files:
